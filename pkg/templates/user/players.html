<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta charset="utf-8">
	<meta name="viewport" content="width=device-width, initial-scale=1">
	<meta name="description" content="View our players profile" >
    <meta name="author" content="Godwin C.N">
	<meta name="robots" content="index, follow">
	<title> Players </title>
	<link rel="stylesheet" href="{{url_for('static',filename='bootstrap/css/bootstrap.min.css')}}">
      <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
		<link rel="preconnect" href="https://fonts.googleapis.com">
	<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
	<link href="https://fonts.googleapis.com/css2?family=Saira+Stencil+One&display=swap" rel="stylesheet">
    <style>
    body {
    font-family: Arial, sans-serif;
    }
    .navbar-brand, [img]{
			max-width:80px; 
			padding:0;
	}
	.football{
		font-family:"Saira Stencil One", sans-serif;
	}
	.ctus{
		border-radius:20px
	}
	.nav-link ul li a{
		text-decoration:none;
		font-size:17px;
		font-weight:bold;
	}
    .nav-link ul [href]:hover{
			font-family:"Saira Stencil One", sans-serif;
		}
	 .young{
		font-size:25px;
	}	

    .profile {
    max-width: 350px;
    background:linear-gradient(to bottom,silver,darkslategray);
    padding: 25px;
    border-radius: 20px;
    text-align: center;
    justify-content: center;
    border: 2px solid gray;
    }

    .player-img {
    width: 90%;
    height: 350px;
    object-fit: cover;
    border-radius: 40px;
    justify-content: center;
    align-items: center;
    border: 2px solid blue;
}
    
    /* .players{
        justify-content: center;
    } */
.video-btn {
  display: inline-block;
  margin-top: 20px;
  padding: 10px 20px;
  text-decoration: none;
  border-radius: 5px;
}
.video-btn:hover{
    background-color:black;
    color:white;
}
	.link-btn:hover{
    background-color:black;
    color:white;
	}
		.footer{
			background:radial-gradient(ellipse, rgb(59, 177, 203) 50%,rgb(43, 74, 131));
		}
		.footer a{
	text-decoration:none;
	color:white;
	}
	a{
		text-decoration:none;
	}
	.discover{
		font-size:100px;
	}
    .footer [href]:hover{
			color:black;
			font-family:"Saira Stencil One", sans-serif;
		}
    </style>
</head>
<body>
    <div class="container-fluid">
       {%include "user/navbar.html"%}


        <div class="row pt-5">
			<div class="col-md-12 pt-5">
				<div class="d-flex justify-content-between align-items-center mb-4">
					<form class="col-md-10 d-flex gap-2">
                        <!-- <input type="hidden" name="csrf_token" value="{{csrf_token()}}"> -->
						<input type="search" id="search_name" name="search" class="form-control" placeholder="Search player...">

						<select name="position" class="form-select" id="search_position">
							<option value="">All Positions</option>
							<option value="Striker(ST)">ST</option>
                            <option value="Right Winger(RW)">RW</option>
                            <option value="Left Winger(LW)">LW</option>
                            <option value="Right Back(RB)">RB</option>
                            <option value="Left Back(LB)">LB</option>
                            <option value="Center Back(CB)">CB</option>
                            <option value="Central Midfielder(CM)">CM</option>
                            <option value="Central Attacking Midfielder(CAM)">CAM</option>
                            <option value="Goalkeeper(GK)">GK</option>
						</select>


						<select name="sort" class="form-select" id="search_age">
							<option value="">Sort By</option>
							<option value="age">Age</option>
						</select>

                        <button class="btn btn-info link-btn" id="reset" >Reset</button>
					</form>
				</div>
             
			</div>
		</div>

     
                <div class="row">
                    <div class="col-md-12">
                            <div id="search_results">
                                {% include "user/player_card.html" %}
                            </div>      
                    </div>
                </div>


        {%include "user/footer.html"%}




    </div>
    <script src="{{url_for('static',filename='bootstrap/js/bootstrap.bundle.js')}}"></script>
    <script src="{{url_for('static',filename='jquery-4.0.0.min.js')}}"></script>
    <script>
        $(document).ready(function(){
            // $('#search_results').hide()
            $('#reset').hide()

            $('#search_name, #search_position, #search_age').on('input change', function(e){
                
                $('#reset').show()
                var searchName = $('#search_name').val()
                var searchPosition = $('#search_position').val()
                var searchAge = $('#search_age').val()
                $.ajax({
                    url: "{{url_for('search_view')}}",
                    type: 'GET',
                    dataType: 'text',
                    data: {
                        name: searchName,
                        position: searchPosition,
                        age: searchAge
                    },
                    success:function(resp){
                        $('#search_results').html(resp)
                    }
                })

            })


            $('#reset').click(function(e){
                e.preventDefault()
                $('#search_name').val('')
                $('#search_position').val('')
                $('#search_age').val('')
                $.ajax({
                    url: "{{url_for('search_view')}}",
                    type: 'GET',
                    success:function(resp){
                        $('#search_results').html(resp)
                        $('#reset').hide()
                    }
                })
            })
                    



        }) //document ready end



    </script>

</body>
</html>
